<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem vindo de volta!</title>
    <link rel="shortcut icon" href="../images/lb_book.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/presets.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/authentication.css">
</head>
<body>
    <div id="auth_form_container" aria-label="Formulário de autenticação">
        <div id="style_section_toggle_theme_button" role="toolbar" aria-label="Tema da interface">
            <button type="button" class="toggle_theme_button_input" id="toggle_theme_button_input_light">
                <img src="../images/sun.webp" alt="" width="16" height="16" aria-hidden="true">
                <span class="visually_hidden">Tema claro</span>
            </button>
            <button type="button" class="toggle_theme_button_input" id="toggle_theme_button_input_dark">
                <img src="../images/moon.webp" alt="" width="16" height="16" aria-hidden="true">
                <span class="visually_hidden">Tema escuro</span>
            </button>
            <button type="button" class="toggle_theme_button_input" id="toggle_theme_button_input_system">
                <img src="../images/device.webp" alt="" width="16" height="16" aria-hidden="true">
                <span class="visually_hidden">Usar tema do dispositivo</span>
            </button>
        </div>
        <main id="auth_form_main">
        <form novalidate id="auth_form_content">
            <div id="auth_form_content_header_container">
                <h1 id="auth_form_content_header_title">Estude como se o <span class="highlighted_text">ENEM</span> fosse amanhã</h1>
            </div>
            <div id="auth_form_content_container">
                <div class="auth_form_content_input_container" id="auth_form_content_email_container">
                    <div class="auth_form_content_input_title_container">
                        <label class="auth_form_content_input_title" id="auth_form_content_email_title" for="auth_form_content_email_input">Email</label>
                        <span class="auth_form_content_input_title_error" id="auth_form_content_email_title_error"></span>
                    </div>
                    <input type="email" class="auth_form_content_input" autocomplete="email" inputmode="email" id="auth_form_content_email_input" required>
                </div>
                <div class="auth_form_content_input_container" id="auth_form_content_password_container">
                    <div class="auth_form_content_input_title_container">
                        <label class="auth_form_content_input_title" id="auth_form_content_password_title" for="auth_form_content_password_input">Senha</label>
                        <span class="auth_form_content_input_title_error" id="auth_form_content_password_title_error"></span>
                    </div>
                    <div class="auth_form_content_password_wrap">
                        <input type="password" class="auth_form_content_input" autocomplete="current-password" id="auth_form_content_password_input" required>
                        <button type="button" class="auth_form_content_password_toggle" id="auth_form_content_password_toggle" aria-label="Mostrar senha digitada" aria-pressed="false">
                            <svg class="auth_form_content_password_toggle_svg" id="auth_form_content_password_toggle_icon_closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                                <ellipse cx="12" cy="12" rx="9" ry="5.25" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
                                <path d="M4 12.25h16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
                            </svg>
                            <svg class="auth_form_content_password_toggle_svg" id="auth_form_content_password_toggle_icon_open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                                <ellipse cx="12" cy="12" rx="9" ry="5.25" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="2.35" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                    <div class="auth_form_content_password_hint_row" id="auth_form_content_password_hint_row">
                        <a href="policies.html" class="highlighted_text auth_form_content_auth_aux_link" id="auth_form_content_privacy_policy_link">Políticas de privacidade</a>
                        <a href="#" class="highlighted_text auth_form_content_password_forgot_link" id="auth_form_content_password_forgot_link">Esqueci minha senha</a>
                    </div>
                </div>
            </div>
            <div id="auth_form_content_footer_container">
                <button type="submit" class="auth_form_content_footer_button" id="auth_form_content_submit_button">Entrar</button>
                <div class="auth_form_content_footer_divider" aria-hidden="true">
                    <span class="auth_form_content_footer_divider_line" aria-hidden="true"></span>
                    <span class="auth_form_content_footer_divider_text">ou</span>
                    <span class="auth_form_content_footer_divider_line" aria-hidden="true"></span>
                </div>
                <button type="button" class="auth_form_content_footer_button" id="auth_form_content_submit_google_button"><div id="auth_form_content_submit_google_button_icon"></div>
                <span id="auth_form_content_submit_google_button_text">Entrar com Google</span></button>
                <div id="auth_form_content_footer_text_container">
                    <span id="auth_form_content_footer_text">Ainda não tem uma conta? </span>
                    <a href="authentication_register.html" class="highlighted_text" id="auth_form_content_footer_text_link">Crie uma agora!</a>
                </div>
            </div>

        </form>
        </main>
    </div>
    <div id="auth_style_container" aria-hidden="true" role="presentation">
        <div id="auth_style_container_custom_layer">
            <div id="auth_style_section_first_content">
                <div class="auth_style_section_first" id="auth_style_section_first_layer_1"></div>
                <div class="auth_style_section_first" id="auth_style_section_first_layer_2"></div>
                <div class="auth_style_section_first" id="auth_style_section_first_layer_3"></div>
            </div>
        </div>
    </div>
    <span id="auth_style_section_title">Pro<span class="highlighted_text">ENEM</span> Lab</span>
    <script src="../js/auth.js" defer></script>
    <script src="../js/general_system.js" defer></script>
</body>
</html>
