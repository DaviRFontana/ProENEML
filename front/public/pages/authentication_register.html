<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seja bem vindo!</title>
    <link rel="shortcut icon" href="../images/lb_book.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/presets.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/authentication.css">
    <link rel="stylesheet" href="../css/authentication_register.css">
</head>
<body class="auth_page_register">
    <div id="auth_form_container" aria-label="Formulário de autenticação">
        <div id="style_section_toggle_theme_button">
            <button type="button" class="toggle_theme_button_input" id="toggle_theme_button_input_light">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" class="bi bi-sun" viewBox="0 0 16 16">
                    <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6m0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/>
                </svg>
            </button>
            <button type="button" class="toggle_theme_button_input" id="toggle_theme_button_input_dark">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" class="bi bi-moon" viewBox="0 0 16 16">
                    <path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278M4.858 1.311A7.27 7.27 0 0 0 1.025 7.71c0 4.02 3.279 7.276 7.319 7.276a7.32 7.32 0 0 0 5.205-2.162q-.506.063-1.029.063c-4.61 0-8.343-3.714-8.343-8.29 0-1.167.242-2.278.681-3.286"/>
                </svg>
            </button>
            <button type="button" class="toggle_theme_button_input" id="toggle_theme_button_input_system">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"  class="bi bi-pc" viewBox="0 0 16 16">
                    <path d="M5 0a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V1a1 1 0 0 0-1-1zm.5 14a.5.5 0 1 1 0 1 .5.5 0 0 1 0-1m2 0a.5.5 0 1 1 0 1 .5.5 0 0 1 0-1M5 1.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5M5.5 3h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1 0-1"/>
                </svg>
            </button>   
        </div>
        <form novalidate id="auth_form_content">
            <div id="auth_form_content_header_container">
                <span id="auth_form_content_header_title">Estude como se o <span class="highlighted_text">ENEM</span> fosse amanhã</span>
            </div>
            <div id="auth_form_content_container">
                <div class="auth_form_content_input_container" id="auth_form_content_username_container">
                    <div class="auth_form_content_input_title_container">
                        <span class="auth_form_content_input_title" id="auth_form_content_username_title">Nome de usuário</span>
                        <span class="auth_form_content_input_title_error" id="auth_form_content_username_title_error"></span>
                    </div>
                    <input type="text" class="auth_form_content_input" id="auth_form_content_username_input" name="username" placeholder="ex.: maria_silva" autocomplete="username" inputmode="text" minlength="3" maxlength="32" pattern="[A-Za-z0-9_]{3,32}" title="Letras, números ou sublinhado, entre 3 e 32 caracteres." required>
                </div>
                <div class="auth_form_content_input_container" id="auth_form_content_email_container">
                    <div class="auth_form_content_input_title_container">
                        <span class="auth_form_content_input_title" id="auth_form_content_email_title">Email</span>
                        <span class="auth_form_content_input_title_error" id="auth_form_content_email_title_error"></span>
                    </div>
                    <input type="email" class="auth_form_content_input" autocomplete="off" inputmode="email" id="auth_form_content_email_input" placeholder="exemplo@gmail.com" required>
                </div>
                <div class="auth_form_content_input_container" id="auth_form_content_password_container">
                    <div class="auth_form_content_input_title_container">
                        <span class="auth_form_content_input_title" id="auth_form_content_password_title">Senha</span>
                        <span class="auth_form_content_input_title_error" id="auth_form_content_password_title_error"></span>
                    </div>
                    <div class="auth_form_content_password_wrap">
                        <input type="password" class="auth_form_content_input" autocomplete="off" inputmode="password" id="auth_form_content_password_input" placeholder="pense em uma senha forte*" autocomplete="current-password" required>
                        <button type="button" class="auth_form_content_password_toggle" id="auth_form_content_password_toggle" aria-label="Mostrar senha digitada" aria-pressed="false">Mostrar</button>
                    </div>
                </div>
                <div class="auth_form_content_terms_container" id="auth_form_content_terms_container">
                    <span id="auth_form_content_terms_text">Eu li e concordo plenamente com os <a href="policies.html" class="highlighted_text">termos de uso</a> e <a href="policies.html" class="highlighted_text">políticas de privacidade</a> ademais que irei aprender bastante.</span>
                    <input type="checkbox" id="auth_form_content_terms_checkbox">
                    <svg id="auth_form_content_terms_checkmark" xmlns="http://www.w3.org/2000/svg" width="16" height="16" class="bi bi-check" viewBox="0 0 16 16">
                        <path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425z"/>
                    </svg>
                </div>
            </div>
            <div id="auth_form_content_footer_container">
                <button type="submit" class="auth_form_content_footer_button" id="auth_form_content_submit_button">Criar conta</button>
                <button type="button" class="auth_form_content_footer_button" id="auth_form_content_submit_google_button"><div id="auth_form_content_submit_google_button_icon"></div>
                <span id="auth_form_content_submit_google_button_text">Entrar com Google</span></button>
                <div id="auth_form_content_footer_text_container">
                    <span id="auth_form_content_footer_text">Já tem uma conta? </span>
                    <a href="authentication_login.html" class="highlighted_text" id="auth_form_content_footer_text_link">Entrar</a>
                </div>
            </div>

        </form>
    </div>
    <main id="auth_style_container" aria-label="Destaque visual">
        <div id="auth_style_container_custom_layer">
            <div id="auth_style_section_first_content">
                <div class="auth_style_section_first" id="auth_style_section_first_layer_1"></div>
                <div class="auth_style_section_first" id="auth_style_section_first_layer_2"></div>
                <div class="auth_style_section_first" id="auth_style_section_first_layer_3"></div>
            </div>
        </div>
    </main>
    <span id="auth_style_section_title">Pro<span class="highlighted_text">ENEM</span> Lab</span>
    <script src="../js/auth.js" defer></script>
    <script src="../js/general_system.js" defer></script>
</body>
</html>
